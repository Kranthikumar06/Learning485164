<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Flip Card Grid</title>
<style>
  body{
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#ede9fe 0%, #bae6fd 100%);
    margin:0; padding:20px;
  }

  /* Filter bar (matches the React demo look) */
  .filter-bar{
    display:flex; flex-wrap:wrap; gap:16px; margin:10px auto 28px; justify-content:center;
  }
  .filter-group{
    background:#fff; padding:10px 14px; border-radius:14px;
    box-shadow:0 6px 18px rgba(0,0,0,.08);
    display:flex; align-items:center; gap:8px; flex-wrap:wrap;
  }
  .filter-group span{font-weight:700; color:#6b21a8}
  .filter-group button{
    padding:6px 12px; border-radius:10px; border:none; cursor:pointer;
    background:#f3f4f6; color:#374151; font-size:14px; font-weight:600; transition:.2s;
  }
  .filter-group button:hover{ background:#e5e7eb }
  .filter-group button.active{ background:#6b21a8; color:#fff }

  /* Grid */
  .grid{
    display:grid; gap:28px;
    grid-template-columns: repeat(3, minmax(260px,1fr));
  }
  @media (max-width: 1024px){ .grid{ grid-template-columns: repeat(2, minmax(260px,1fr)); } }
  @media (max-width: 640px){ .grid{ grid-template-columns: 1fr; } }

  /* Card flip like the React sample (w-80 h-96 equivalent) */
  .card{ perspective:1000px; }
  .card-inner{
    position:relative; width:100%; height:384px; /* h-96 */
    transform-style:preserve-3d; transition: transform .8s ease-in-out;
    cursor:pointer;
  }
  .card.flipped .card-inner{ transform: rotateY(180deg); }

  .card-front, .card-back{
    position:absolute; inset:0; border-radius:18px; overflow:hidden;
    box-shadow:0 20px 40px rgba(0,0,0,.18);
    -webkit-backface-visibility:hidden; backface-visibility:hidden;
  }
  .card-front img{
    width:100%; height:100%; object-fit:cover; display:block;
    transition: transform .5s ease;
  }
  .card-front:hover img{ transform: scale(1.1); }
  .card-front .info{
    position:absolute; left:0; right:0; bottom:0; padding:14px;
    color:#fff;
    background: linear-gradient(to top, rgba(0,0,0,.7), transparent 60%);
  }
  .card-front .info h3{ margin:0 0 4px; font-size:20px; font-weight:800; }

  .card-back{
    background:#fff; transform: rotateY(180deg);
    display:flex; flex-direction:column; padding:18px;
  }
  .card-back h3{ margin:0 0 10px; color:#6b21a8; font-size:22px; font-weight:800; display:flex; align-items:center; gap:8px; }
  .card-back p{ margin:6px 0; color:#374151; }
  .card-back .status{ margin-top:8px; font-weight:700; }
  .card-back button{
    margin-top:auto; align-self:flex-start;
    padding:8px 14px; border:none; border-radius:12px; color:#fff; background:#6b21a8;
    box-shadow:0 6px 16px rgba(107,33,168,.25);
    transition:.2s;
    pointer-events:auto;
  }
  .card-back button:hover{ background:#7c2ce0 }

  /* Ensure button click does not propagate (visual only) */
  .card-back button{ cursor:pointer }
</style>
</head>
<body>

<!-- Filter Bar -->
<div class="filter-bar">
  <div class="filter-group" data-type="category">
    <span>Complaint Type:</span>
    <button class="active" data-filter="All">All</button>
    <button data-filter="Harassment">Harassment</button>
    <button data-filter="Food Issue">Food Issue</button>
    <button data-filter="Lost and Found">Lost and Found</button>
    <button data-filter="Hostel Issue">Hostel Issue</button>
  </div>
  <div class="filter-group" data-type="status">
    <span>Status:</span>
    <button class="active" data-filter="All">All</button>
    <button data-filter="Solved">Solved</button>
    <button data-filter="Unsolved">Unsolved</button>
  </div>
</div>

<!-- Card Grid -->
<div class="grid" id="cardGrid"></div>

<script>
  const items = [
    { title: "Lost Water Bottle", description: "Blue water bottle with black cap", date:"2025-09-24", phone:"9502567233", category:"Lost and Found", location:"Library", solved:false, img:"https://images.unsplash.com/photo-1560807707-8cc77767d783?auto=format&fit=crop&w=800&q=80" },
    { title: "Lost Backpack", description:"Black backpack with red stripes", date:"2025-09-20", phone:"9501112223", category:"Lost and Found", location:"Cafeteria", solved:true, img:"https://images.unsplash.com/photo-1604014237744-df9fa4c8a83b?auto=format&fit=crop&w=800&q=80" },
    { title:"Lost Umbrella", description:"Red umbrella with wooden handle", date:"2025-09-15", phone:"9502223334", category:"Lost and Found", location:"Auditorium", solved:false, img:"https://images.unsplash.com/photo-1520962918287-7448c2878f65?auto=format&fit=crop&w=800&q=80" },
    { title:"Lost Wallet", description:"Brown leather wallet with ID", date:"2025-09-10", phone:"9503334445", category:"Lost and Found", location:"Playground", solved:true, img:"https://images.unsplash.com/photo-1612817159949-1cfb78a1c6be?auto=format&fit=crop&w=800&q=80" },

    { title:"Harassment Complaint 1", description:"Reported incident in classroom", date:"2025-09-12", phone:"9504445556", category:"Harassment", location:"Block A", solved:false, img:"https://images.unsplash.com/photo-1581093448798-5c44c3e02f87?auto=format&fit=crop&w=800&q=80" },
    { title:"Harassment Complaint 2", description:"Bullying near hostel", date:"2025-09-18", phone:"9505556667", category:"Harassment", location:"Hostel D", solved:true, img:"https://images.unsplash.com/photo-1598993419011-38cbbf5f9910?auto=format&fit=crop&w=800&q=80" },

    { title:"Food Issue - Mess", description:"Food not hygienic in mess", date:"2025-09-14", phone:"9506667778", category:"Food Issue", location:"College Mess", solved:false, img:"https://images.unsplash.com/photo-1606788075761-44e0b98c45db?auto=format&fit=crop&w=800&q=80" },
    { title:"Food Issue - Canteen", description:"Stale food served in canteen", date:"2025-09-22", phone:"9507778889", category:"Food Issue", location:"Main Canteen", solved:true, img:"https://images.unsplash.com/photo-1604152135912-04a78742027b?auto=format&fit=crop&w=800&q=80" },

    { title:"Hostel Issue - Water Supply", description:"No water supply for 2 days", date:"2025-09-16", phone:"9508889990", category:"Hostel Issue", location:"Hostel A", solved:false, img:"https://images.unsplash.com/photo-1560250097-0b93528c311a?auto=format&fit=crop&w=800&q=80" },
    { title:"Hostel Issue - Electricity", description:"Frequent power cuts", date:"2025-09-19", phone:"9509990001", category:"Hostel Issue", location:"Hostel B", solved:true, img:"https://images.unsplash.com/photo-1577154306186-3c89c0e1f6a5?auto=format&fit=crop&w=800&q=80" },
    { title:"Hostel Issue - Cleanliness", description:"Rooms not cleaned regularly", date:"2025-09-21", phone:"9510001112", category:"Hostel Issue", location:"Hostel C", solved:false, img:"https://images.unsplash.com/photo-1600585154526-990dced4db0d?auto=format&fit=crop&w=800&q=80" },
    { title:"Hostel Issue - Security", description:"Security guard absent at night", date:"2025-09-23", phone:"9511112223", category:"Hostel Issue", location:"Hostel D", solved:true, img:"https://images.unsplash.com/photo-1581338834647-b0fb40704e84?auto=format&fit=crop&w=800&q=80" }
  ];

  const grid = document.getElementById("cardGrid");

  function cardTemplate(item){
    // fallback image if external URL fails
    const fallback = "https://images.unsplash.com/photo-1520975916090-3105956dac38?auto=format&fit=crop&w=800&q=60";
    return `
      <div class="card">
        <div class="card-inner">
          <div class="card-front">
            <img src="${item.img}" alt="${item.title}" onerror="this.onerror=null;this.src='${fallback}';">
            <div class="info">
              <h3>${item.title}</h3>
              <p>Click to view details</p>
            </div>
          </div>
          <div class="card-back">
            <h3>Item Details</h3>
            <p><strong>Date:</strong> ${item.date}</p>
            <p><strong>Phone:</strong> ${item.phone}</p>
            <p><strong>Category:</strong> ${item.category}</p>
            <p><strong>Location:</strong> ${item.location}</p>
            <p>${item.description}</p>
            <p class="status">Status: ${item.solved ? "Solved ✅" : "Unsolved ❌"}</p>
            <button type="button">Back</button>
          </div>
        </div>
      </div>
    `;
  }

  function renderCards(filterCategory="All", filterStatus="All"){
    grid.innerHTML = "";
    const filtered = items.filter(it=>{
      const cat = filterCategory==="All" || it.category===filterCategory;
      const stat = filterStatus==="All" || (filterStatus==="Solved" ? it.solved : !it.solved);
      return cat && stat;
    });
    filtered.forEach(it=>{
      const wrap = document.createElement("div");
      wrap.innerHTML = cardTemplate(it).trim();
      const card = wrap.firstElementChild;
      grid.appendChild(card);

      // interactions
      const backBtn = card.querySelector(".card-back button");
      card.addEventListener("click", ()=> card.classList.toggle("flipped"));
      backBtn.addEventListener("click", (e)=>{ e.stopPropagation(); card.classList.remove("flipped"); });
    });
  }

  renderCards();

  // Filters
  document.querySelectorAll(".filter-group").forEach(group=>{
    group.querySelectorAll("button").forEach(btn=>{
      btn.addEventListener("click", ()=>{
        group.querySelectorAll("button").forEach(b=>b.classList.remove("active"));
        btn.classList.add("active");
        const cat = document.querySelector(".filter-group[data-type='category'] .active").dataset.filter;
        const stat = document.querySelector(".filter-group[data-type='status'] .active").dataset.filter;
        renderCards(cat, stat);
      });
    });
  });
</script>
</body>
</html>
