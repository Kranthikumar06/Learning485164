<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Secure My Campus - Chat Assistant</title>
    <link rel="stylesheet" href="helpcenter.css">
</head>

<body>
  <!-- Navbar -->
  <div class="navbar">
    <div class="logo-container">
      <img src="Campus.png" alt="Secure Campus Logo">
      <div>
        <span>Secure</span>
        <span>Campus</span>
      </div>
    </div>
    <div class="nav-links">
      <a href="#">Home</a>
      <a href="#">Complaint Box</a>
      <a href="#">Form Page</a>
      <a href="#">Help Center</a>
    </div>
  </div>

  <!-- Chat Section -->
  <div class="content">
    <div class="chat-box" id="chatBox">
      <div class="message bot">👋 Hello! I’m your Secure Campus Assistant. How can I help you today?</div>
    </div>

    <div class="chat-input-wrapper">
      <input type="text" id="userInput" placeholder="Type your message..." autocomplete="off">
      <button id="sendBtn">➤</button>
    </div>
  </div>

  <!-- Footer -->
  <footer>
    <p>© 2025 Secure My Campus | <a href="#">Privacy Policy</a> | <a href="#">Help Center</a></p>
  </footer>
  <script src="helpcenter.js"></script>
  
</body>

</html>
